<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>All Friends</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
	overflow-x:auto;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
	font-size:14px;
}

th{
    background:#673ab7;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border:1px solid #ddd;
}

tr:hover{
    background:#f0f0f0;
}

</style>

</head>

<body>

	<form action="/search" method="get" style="text-align:center; margin-bottom:20px;">

	    <input type="text"
	           name="name"
	           placeholder="Search Friend Name">

	    <button type="submit">
	        Search
	    </button>

	</form>
<h1>All Friends Information</h1>

<table>

	<tr>
	    <th>ID</th>
	    <th>Name</th>
	    <th>DOB</th>
	    <th>Age</th>
	    <th>Mobile</th>
	    <th>Email</th>
	    <th>Food</th>
	    <th>Movie</th>
	    <th>Color</th>
	    <th>Place</th>
	    <th>Hobbies</th>
	    <th>Strength</th>
	    <th>Motivation</th>
	    <th>Happiness</th>
	    <th>About Me</th>
		<th>Action</th>
	</tr>
	<tr th:each="friend, friendStat : ${friends}">
	    <td th:text="${friendStat.count}"></td>
	    <td th:text="${friend.fullName}"></td>
	    <td th:text="${friend.dob}"></td>
	    <td th:text="${friend.age}"></td>
	    <td th:text="${friend.mobile}"></td>
	    <td th:text="${friend.email}"></td>
	    <td th:text="${friend.favoriteFood}"></td>
	    <td th:text="${friend.favoriteMovie}"></td>
	    <td th:text="${friend.favoriteColor}"></td>
	    <td th:text="${friend.favoritePlace}"></td>
	    <td th:text="${friend.hobbiesText}"></td>
	    <td th:text="${friend.strength}"></td>
	    <td th:text="${friend.motivation}"></td>
	    <td th:text="${friend.happiness}"></td>
	    <td th:text="${friend.aboutMe}"></td>
		<td>

		    <a th:href="@{/edit(id=${friend.id})}">
		        Edit
		    </a>

		    |

		    <a th:href="@{/delete(id=${friend.id})}"
		       onclick="return confirm('Are you sure you want to delete this record?')">
		        Delete
		    </a>

		</td>
	</tr>
</table>
<form action="/logout" method="post">
    <button type="submit">Logout</button>
</form>
</body>
</html>
